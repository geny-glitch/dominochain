name: Android OTA Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - staging
    paths:
      - "android/**"
      - ".github/workflows/android-ota-release.yml"

permissions:
  contents: write

concurrency:
  group: android-ota-release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  release:
    name: Build and publish latest APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Select release target
        run: |
          if [ "${GITHUB_REF_NAME}" = "staging" ]; then
            echo "APK_FLAVOR=staging" >> "${GITHUB_ENV}"
            echo "BACKEND_NOTIFY_URL=https://beta.dominochain.app/android/version" >> "${GITHUB_ENV}"
            echo "LATEST_TAG=latest-staging" >> "${GITHUB_ENV}"
            echo "BUILD_TAG_PREFIX=build-staging" >> "${GITHUB_ENV}"
          else
            echo "APK_FLAVOR=prod" >> "${GITHUB_ENV}"
            echo "BACKEND_NOTIFY_URL=https://dominochain.app/android/version" >> "${GITHUB_ENV}"
            echo "LATEST_TAG=latest" >> "${GITHUB_ENV}"
            echo "BUILD_TAG_PREFIX=build" >> "${GITHUB_ENV}"
          fi

      - name: Decode release keystore
        run: |
          echo "${KEYSTORE_FILE}" | base64 --decode > android/app/release.keystore
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}

      - name: Compute next OTA version code
        id: ota_version
        run: |
          if [ "${GITHUB_REF_NAME}" = "staging" ]; then
            NEXT_VERSION_CODE="${GITHUB_RUN_NUMBER}"
          else
            NEXT_VERSION_CODE="$(python3 -c 'import json, os; current_version_code = int(json.load(open("version.json", encoding="utf-8"))["versionCode"]); run_number = int(os.environ["GITHUB_RUN_NUMBER"]); print(max(current_version_code + 1, run_number))')"
          fi
          echo "code=${NEXT_VERSION_CODE}" >> "${GITHUB_OUTPUT}"

      - name: Build signed release APK
        working-directory: android
        run: |
          if [ "${APK_FLAVOR}" = "staging" ]; then
            GRADLE_TASK="assembleStagingRelease"
          else
            GRADLE_TASK="assembleProdRelease"
          fi
          for attempt in 1 2 3; do
            if ./gradlew --no-daemon "${GRADLE_TASK}"; then
              exit 0
            fi
            if [ "${attempt}" -eq 3 ]; then
              exit 1
            fi
            sleep "$((attempt * 10))"
          done
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          OTA_VERSION_CODE: ${{ steps.ota_version.outputs.code }}

      - name: Read version code
        id: version
        working-directory: android
        run: |
          for attempt in 1 2 3; do
            if VERSION_CODE="$(OTA_VERSION_CODE="${OTA_VERSION_CODE}" ./gradlew --no-daemon -q printVersionCode)"; then
              echo "code=${VERSION_CODE}" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            if [ "${attempt}" -eq 3 ]; then
              exit 1
            fi
            sleep "$((attempt * 10))"
          done
        env:
          OTA_VERSION_CODE: ${{ steps.ota_version.outputs.code }}

      - name: Update version.json
        if: github.ref_name == 'main'
        run: |
          python3 - <<'PY'
          import json
          import os

          repository = os.environ["GITHUB_REPOSITORY"]
          version_code = int(os.environ["VERSION_CODE"])
          payload = {
              "versionCode": version_code,
              "url": f"https://github.com/{repository}/releases/download/latest/app.apk",
          }
          with open("version.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, indent=2)
              f.write("\n")
          PY
        env:
          VERSION_CODE: ${{ steps.version.outputs.code }}

      - name: Prepare APK asset
        run: cp "android/app/build/outputs/apk/${APK_FLAVOR}/release/app-${APK_FLAVOR}-release.apk" app.apk

      - name: Notify backend of new version (prod)
        if: github.ref_name == 'main'
        run: |
          http_code=$(curl -s -o /tmp/notify-response.txt -w "%{http_code}" -X POST "${BACKEND_NOTIFY_URL}" \
            -H "Authorization: Bearer ${DEPLOY_SECRET}" \
            -F "versionCode=${{ steps.version.outputs.code }}" \
            -F "apk=@app.apk;type=application/vnd.android.package-archive")
          if [ "$http_code" -ge 400 ]; then
            echo "Backend returned HTTP ${http_code}: $(cat /tmp/notify-response.txt)" >&2
            exit 1
          fi
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}

      - name: Notify backend of new version (staging)
        if: github.ref_name == 'staging'
        run: |
          curl --fail -s -X POST "${BACKEND_NOTIFY_URL}" \
            -H "Authorization: Bearer ${DEPLOY_SECRET}" \
            -F "versionCode=${{ steps.version.outputs.code }}" \
            -F "apk=@app.apk;type=application/vnd.android.package-archive"
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET_STAGING }}

      - name: Publish versioned GitHub release
        run: |
          gh release create "${BUILD_TAG_PREFIX}-${{ steps.version.outputs.code }}" app.apk \
            --title "Build ${APK_FLAVOR} ${{ steps.version.outputs.code }}" \
            --notes "Android ${APK_FLAVOR} build ${{ steps.version.outputs.code }} — commit ${{ github.sha }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update latest GitHub release
        run: |
          if gh release view "${LATEST_TAG}" >/dev/null 2>&1; then
            gh release upload "${LATEST_TAG}" app.apk --clobber
          else
            gh release create "${LATEST_TAG}" app.apk --title "Latest Android APK (${APK_FLAVOR})" --notes "Automated latest Android ${APK_FLAVOR} release."
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Commit version metadata
        if: github.ref_name == 'main'
        continue-on-error: true
        run: |
          git fetch origin "${GITHUB_REF_NAME}"

          if git show "origin/${GITHUB_REF_NAME}:version.json" >/dev/null 2>&1; then
            REMOTE_CODE=$(git show "origin/${GITHUB_REF_NAME}:version.json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["versionCode"])')
            LOCAL_CODE=$(python3 -c 'import json; print(json.load(open("version.json"))["versionCode"])')
            if [ "$REMOTE_CODE" -ge "$LOCAL_CODE" ]; then
              echo "Remote version.json already at ${REMOTE_CODE} (>= ${LOCAL_CODE}); skipping commit"
              exit 0
            fi
          fi

          if git diff --quiet -- version.json; then
            echo "version.json is already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "Update Android OTA version metadata [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
