name: Android OTA Release

on:
  push:
    branches:
      - main
    paths:
      - "android/**"
      - ".github/workflows/android-ota-release.yml"

permissions:
  contents: write

concurrency:
  group: android-ota-release
  cancel-in-progress: true

jobs:
  release:
    name: Build and publish latest APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        run: |
          echo "${KEYSTORE_FILE}" | base64 --decode > android/app/release.keystore
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}

      - name: Compute next OTA version code
        id: ota_version
        run: |
          NEXT_VERSION_CODE="$(python3 - <<'PY'
          import json
          import os

          with open("version.json", encoding="utf-8") as f:
              current_version_code = int(json.load(f)["versionCode"])
          run_number = int(os.environ["GITHUB_RUN_NUMBER"])
          print(max(current_version_code + 1, run_number))
          PY
          )"
          echo "code=${NEXT_VERSION_CODE}" >> "${GITHUB_OUTPUT}"

      - name: Build signed release APK
        working-directory: android
        run: |
          for attempt in 1 2 3; do
            if ./gradlew --no-daemon assembleRelease; then
              exit 0
            fi
            if [ "${attempt}" -eq 3 ]; then
              exit 1
            fi
            sleep "$((attempt * 10))"
          done
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          OTA_VERSION_CODE: ${{ steps.ota_version.outputs.code }}

      - name: Read version code
        id: version
        working-directory: android
        run: |
          for attempt in 1 2 3; do
            if VERSION_CODE="$(OTA_VERSION_CODE="${OTA_VERSION_CODE}" ./gradlew --no-daemon -q printVersionCode)"; then
              echo "code=${VERSION_CODE}" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            if [ "${attempt}" -eq 3 ]; then
              exit 1
            fi
            sleep "$((attempt * 10))"
          done
        env:
          OTA_VERSION_CODE: ${{ steps.ota_version.outputs.code }}

      - name: Update version.json
        run: |
          python3 - <<'PY'
          import json
          import os

          repository = os.environ["GITHUB_REPOSITORY"]
          version_code = int(os.environ["VERSION_CODE"])
          payload = {
              "versionCode": version_code,
              "url": f"https://github.com/{repository}/releases/download/latest/app.apk",
          }
          with open("version.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, indent=2)
              f.write("\n")
          PY
        env:
          VERSION_CODE: ${{ steps.version.outputs.code }}

      - name: Commit version metadata
        run: |
          if git diff --quiet -- version.json; then
            echo "version.json is already up to date"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add version.json
            git commit -m "Update Android OTA version metadata [skip ci]"
            git push
          fi

      - name: Prepare APK asset
        run: cp android/app/build/outputs/apk/release/app-release.apk app.apk

      - name: Notify backend of new version
        run: |
          curl --fail -s -X POST https://bg-backend.fly.dev/android/version \
            -H "Authorization: Bearer ${DEPLOY_SECRET}" \
            -F "versionCode=${{ steps.version.outputs.code }}" \
            -F "apk=@app.apk;type=application/vnd.android.package-archive"
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}

      - name: Publish versioned GitHub release
        run: |
          gh release create "build-${{ steps.version.outputs.code }}" app.apk \
            --title "Build ${{ steps.version.outputs.code }}" \
            --notes "Android build ${{ steps.version.outputs.code }} — commit ${{ github.sha }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update latest GitHub release
        run: |
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest app.apk --clobber
          else
            gh release create latest app.apk --title "Latest Android APK" --notes "Automated latest Android release."
          fi
        env:
          GH_TOKEN: ${{ github.token }}
