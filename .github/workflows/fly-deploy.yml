# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/
name: Fly Deploy

on:
  push:
    branches:
      - main
      - staging
    paths:
      - "backend/**"
      - ".github/workflows/fly-deploy.yml"

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Select Fly app and config
        working-directory: backend
        run: |
          if [ "${GITHUB_REF_NAME}" = "staging" ]; then
            echo "FLY_CONFIG=fly.staging.toml" >> "${GITHUB_ENV}"
            echo "FLY_APP=bg-backend-staging" >> "${GITHUB_ENV}"
          else
            echo "FLY_CONFIG=fly.toml" >> "${GITHUB_ENV}"
            echo "FLY_APP=bg-backend" >> "${GITHUB_ENV}"
          fi

      - name: Deploy to Fly.io
        working-directory: backend
        run: flyctl deploy --remote-only --config "${FLY_CONFIG}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # Fly can keep multiple machines per process group; one worker is enough for Solid Queue.
      - name: Scale worker group to one machine
        working-directory: backend
        run: flyctl scale count worker=1 -y --app "${FLY_APP}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # Safety net: after some deployments, only a stopped standby worker may remain.
      # Ensure at least one worker machine is actually started to process Solid Queue jobs.
      - name: Ensure one worker machine is started
        working-directory: backend
        run: |
          worker_started_count=$(flyctl machine list -a "${FLY_APP}" --json | jq '[.[] | select(.config.metadata.fly_process_group == "worker") | select(.state == "started")] | length')
          if [ "$worker_started_count" -eq 0 ]; then
            worker_id=$(flyctl machine list -a "${FLY_APP}" --json | jq -r '[.[] | select(.config.metadata.fly_process_group == "worker")][0].id // empty')
            if [ -n "$worker_id" ]; then
              flyctl machine start "$worker_id" -a "${FLY_APP}"
            else
              echo "No worker machine found after scaling" >&2
              exit 1
            fi
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
