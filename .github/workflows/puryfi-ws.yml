# Deploy PuryFi WebSocket bridge (Node) to Fly.io
name: PuryFi WebSocket

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "puryfi-ws/**"
      - ".github/workflows/puryfi-ws.yml"

concurrency:
  group: puryfi-ws
  cancel-in-progress: true

jobs:
  deploy:
    name: Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        working-directory: puryfi-ws
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
