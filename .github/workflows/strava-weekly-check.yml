# Runs the Strava rolling-window goal evaluator against the deployed Rails app.
name: Strava Due Goal Check

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:

jobs:
  check:
    name: Check due Strava goals
    runs-on: ubuntu-latest
    concurrency:
      group: strava-weekly-check
      cancel-in-progress: false
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Run due Strava checks on Fly.io
        run: flyctl ssh console --app bg-backend -C "cd /rails && bin/rails strava:check_due_goals"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
