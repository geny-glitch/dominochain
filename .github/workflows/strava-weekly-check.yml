# Runs the Strava weekly goal evaluator against the deployed Rails app.
name: Strava Weekly Goal Check

on:
  schedule:
    - cron: "15 5 * * 1"
  workflow_dispatch:

jobs:
  check:
    name: Check Strava goals
    runs-on: ubuntu-latest
    concurrency:
      group: strava-weekly-check
      cancel-in-progress: false
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Run weekly Strava checks on Fly.io
        run: flyctl ssh console --app bg-backend -C "cd /rails && bin/rails strava:check_weekly_goals"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
