  terms:
    title: "Condiciones de uso"
    updated: "Última actualización: julio de 2026"
    home: "Inicio"
    lead: "DominoChain es una plataforma experimental y lúdica. Al usarla, aceptas lo siguiente — redactado en lenguaje sencillo, sin pretender ser un bufete de abogados."
    sections:
      - heading: "Servicio experimental"
        body: "DominoChain se ofrece tal cual, puede cambiar o detenerse en cualquier momento y puede contener errores. No hay garantía de disponibilidad, exactitud ni idoneidad para un fin concreto."
      - heading: "Solo adultos (18+)"
        body: "Debes tener al menos 18 años para usar este servicio. La plataforma puede incluir temas adultos y kink. Eres responsable de asegurarte de que tu uso sea legal donde vivas."
      - heading: "Tu responsabilidad"
        body: "Muchas acciones en DominoChain pueden ser irreversibles o afectar dispositivos reales y servicios de terceros (candados, descargas, fondos de pantalla, tareas, etc.). Tú eliges qué activar y con quién jugar. Procede con cautela."
      - heading: "Servicios de terceros"
        body: "Las integraciones (Chaster, PiShock, Strava, etc.) las operan terceros. No las controlamos ni somos responsables de su comportamiento, caídas o las consecuencias de vincular tus cuentas."
      - heading: "Sin garantías"
        body: "El servicio y su contenido se proporcionan «tal cual» y «según disponibilidad», sin garantías de ningún tipo, expresas o implícitas."
      - heading: "Limitación de responsabilidad"
        body: "En la máxima medida permitida por la ley aplicable, DominoChain y sus operadores no serán responsables de daños directos, indirectos, incidentales, especiales o consecuentes derivados de tu uso del servicio — incluida pérdida de datos, problemas con dispositivos, angustia emocional o interacciones con otros usuarios."
      - heading: "Cambios"
        body: "Podemos actualizar estas condiciones en cualquier momento. Seguir usando el servicio tras los cambios implica que aceptas la versión actualizada."
