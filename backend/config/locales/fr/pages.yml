  terms:
    title: "Conditions d'utilisation"
    updated: "Dernière mise à jour : juillet 2026"
    home: "Accueil"
    lead: "DominoChain est une plateforme expérimentale et ludique. En l'utilisant, tu acceptes ce qui suit — rédigé en langage simple, sans prétendre être un cabinet d'avocats."
    sections:
      - heading: "Service expérimental"
        body: "DominoChain est fourni tel quel, peut changer ou s'arrêter à tout moment, et peut contenir des bugs. Aucune garantie de disponibilité, d'exactitude ou d'adéquation à un usage particulier."
      - heading: "Réservé aux adultes (18+)"
        body: "Tu dois avoir au moins 18 ans pour utiliser ce service. La plateforme peut inclure des thèmes adultes et kink. Tu es responsable de t'assurer que ton usage est légal là où tu vis."
      - heading: "Ta responsabilité"
        body: "De nombreuses actions sur DominoChain peuvent être irréversibles ou affecter de vrais appareils et services tiers (cadenas, chocs, fonds d'écran, tâches, etc.). Tu choisis ce que tu actives et avec qui tu joues. Avance avec prudence."
      - heading: "Services tiers"
        body: "Les intégrations (Chaster, PiShock, Strava, etc.) sont opérées par des tiers. Nous ne les contrôlons pas et ne sommes pas responsables de leur comportement, de leurs pannes ou des conséquences de la liaison de tes comptes."
      - heading: "Aucune garantie"
        body: "Le service et son contenu sont fournis « en l'état » et « selon disponibilité », sans garantie d'aucune sorte, expresse ou implicite."
      - heading: "Limitation de responsabilité"
        body: "Dans toute la mesure permise par la loi applicable, DominoChain et ses opérateurs ne pourront être tenus responsables de dommages directs, indirects, accessoires, spéciaux ou consécutifs liés à ton usage du service — y compris perte de données, problèmes d'appareil, détresse émotionnelle ou interactions avec d'autres utilisateurs."
      - heading: "Modifications"
        body: "Nous pouvons mettre à jour ces conditions à tout moment. Continuer à utiliser le service après modification vaut acceptation de la version mise à jour."
