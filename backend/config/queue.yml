default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: wallpaper_verification
      threads: 1
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1
    - queues: default
      threads: <%= ENV.fetch("SOLID_QUEUE_DEFAULT_THREADS", 2) %>
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
