# fly.toml app configuration file for bg-backend-staging
#
# Staging mirrors production settings as closely as possible while
# using a dedicated Fly app, volume, and secrets.

app = 'bg-backend-staging'
primary_region = 'cdg'
console_command = '/rails/bin/rails console'

[build]

[env]
  RAILS_ENV = 'production'
  RAILS_LOG_TO_STDOUT = '1'
  BG_ENV = 'staging'
  SOLID_QUEUE_IN_PUMA = '1'
  RAILS_MAX_THREADS = '2'
  SOLID_QUEUE_DEFAULT_THREADS = '1'
  # Wallpaper fuzzy verification thresholds (optional; same defaults as code)
  WALLPAPER_SSIM_THRESHOLD = '0.75'
  WALLPAPER_DHASH_THRESHOLD = '15'
  WALLPAPER_SCORE_THRESHOLD = '0.65'
  WALLPAPER_SCORE_DHASH_MAX = '18'
  WALLPAPER_SCORE_MAD_MAX = '25'
  WALLPAPER_MISMATCH_SSIM = '0.5'
  WALLPAPER_MISMATCH_DHASH = '20'
  WALLPAPER_MAD_MATCH_THRESHOLD = '18'
  WALLPAPER_MAD_MISMATCH_THRESHOLD = '45'

[processes]
  app = "./bin/rails server"

[[mounts]]
  source = 'storage_volume'
  destination = '/rails/storage'
  initial_size = '1gb'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '5s'
    method = 'GET'
    path = '/up'
    protocol = 'http'
    tls_skip_verify = false

    [http_service.checks.headers]
      X-Forwarded-Proto = 'https'

[[vm]]
  processes = ['app']
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
