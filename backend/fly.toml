# fly.toml app configuration file generated for bg-backend on 2026-03-02T17:04:53+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bg-backend'
primary_region = 'cdg'
console_command = '/rails/bin/rails console'

[build]

[env]
  RAILS_ENV = 'production'
  RAILS_LOG_TO_STDOUT = '1'
  ACTIVE_STORAGE_SERVICE = 'tigris'
  ACTIVE_STORAGE_KEY_PREFIX = 'production/'
  RAILS_MAX_THREADS = '3'
  SOLID_QUEUE_DEFAULT_THREADS = '2'

[processes]
  app = "./bin/rails server"
  worker = "bin/jobs"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '5s'
    method = 'GET'
    path = '/up'
    protocol = 'http'
    tls_skip_verify = false

    [http_service.checks.headers]
      X-Forwarded-Proto = 'https'

[[vm]]
  processes = ['app']
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

[[vm]]
  processes = ['worker']
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
