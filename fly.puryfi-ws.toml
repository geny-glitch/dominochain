# ws plugin — deploy from repo root:
#   flyctl deploy -c fly.puryfi-ws.toml
#
app = "bg-puryfi-ws"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile.puryfi-ws"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
